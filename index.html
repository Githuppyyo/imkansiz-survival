<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>İMKANSIZ SURVIVAL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a1a2e;font-family:Arial,sans-serif;cursor:crosshair;color:#fff}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:30px;z-index:11;opacity:0.7;text-shadow:0 0 8px #000;display:none}
.bar-bg{position:absolute;left:20px;height:18px;border-radius:4px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08)}
.bar{position:absolute;left:20px;height:18px;border-radius:4px;transition:width .2s}
.lbl{position:absolute;left:20px;color:#fff;font-size:11px;font-weight:bold;text-shadow:0 0 6px #000}
#waveText{position:fixed;top:25px;left:50%;transform:translateX(-50%);font-size:32px;font-weight:bold;text-shadow:0 0 30px rgba(255,0,0,0.4);z-index:12}
#timerTxt{position:fixed;top:65px;left:50%;transform:translateX(-50%);font-size:14px;color:#ccc;z-index:12}
#notif{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:bold;text-shadow:0 0 20px #000;z-index:15;opacity:0;transition:.3s}
#gameover{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;pointer-events:auto}
#gameover h1{color:#f00;font-size:56px;margin-bottom:15px}
#gameover p{font-size:19px;margin-bottom:25px;text-align:center;line-height:1.7}
#gameover button{padding:13px 45px;font-size:18px;margin:6px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
#gameover .r{background:#cc0000;color:#fff}
#gameover .m{background:#444;color:#aaa}
#menu{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,20,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;pointer-events:auto}
#menu h1{color:#ff3333;font-size:60px;margin-bottom:5px;letter-spacing:4px}
#menu h2{color:#666;font-size:15px;margin-bottom:35px;font-weight:normal}
#menu .k{color:#999;font-size:14px;line-height:2.4;text-align:center;margin-bottom:30px}
#menu .k kbd{color:#fff;background:rgba(255,255,255,0.06);padding:3px 14px;border-radius:4px;border:1px solid rgba(255,255,255,0.08)}
#menu .go{padding:18px 80px;font-size:28px;border:none;border-radius:12px;cursor:pointer;font-weight:bold;background:#cc0000;color:#fff;transition:.2s}
#menu .go:hover{background:#ff0000;transform:scale(1.04)}
#flash{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 40%,rgba(255,0,0,0.5));pointer-events:none;z-index:9;opacity:0;transition:.08s}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#0a0a14;z-index:999;font-size:20px;color:#888}
</style>
</head>
<body>
<div id="loading">Yükleniyor...</div>
<div id="menu">
<h1>İMKANSIZ SURVIVAL</h1>
<h2>Ne kadar uzun hayatta kalabileceksin?</h2>
<div class="k">
<kbd>W A S D</kbd> Yürü &nbsp; <kbd>Shift</kbd> Koş &nbsp; <kbd>Sol Tık</kbd> Vur<br>
<kbd>E</kbd> Topla &nbsp; <kbd>Space</kbd> Zıpla &nbsp; <kbd>R</kbd> Yeniden Başla
</div>
<button class="go" onclick="basla()">BAŞLA</button>
</div>
<div id="gameover"><h1>ÖLDÜN</h1><p id="goText"></p><button class="r" onclick="restart()">R - Yeniden Başla</button><button class="m" onclick="menuGoster()">Ana Menü</button></div>
<div id="flash"></div>
<div id="crosshair">+</div>
<div id="ui">
<div id="waveText"></div><div id="timerTxt"></div>
<div class="bar-bg" style="bottom:68px;width:280px"></div><div class="bar" id="hb" style="bottom:68px;width:280px;background:#cc0000"></div><div class="lbl" style="bottom:90px">SAĞLIK</div>
<div class="bar-bg" style="bottom:44px;width:280px"></div><div class="bar" id="hub" style="bottom:44px;width:280px;background:#cc8800"></div><div class="lbl" style="bottom:66px">AÇLIK</div>
<div class="bar-bg" style="bottom:20px;width:280px"></div><div class="bar" id="thb" style="bottom:20px;width:280px;background:#2266cc"></div><div class="lbl" style="bottom:42px">SUSUZLUK</div>
</div>
<div id="notif"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============ OYUN ============
const S={h:100,hMax:100,hu:100,huMax:100,t:100,tMax:100,st:100,stMax:100};
let sc,cam,ren,oyun=false,bitti=false,zaman=0,dalga=1,zorluk=1,wT=3,atkCD=0;
let oyuncu={x:0,y:0.5,z:0,yaw:0,pitch:0,vx:0,vy:0,vz:0,yerde:true};
let keys={},md=false,du$=[],enemies=[],resources=[];
let saat=new THREE.Clock(),nTM=null;

function menuGoster(){document.getElementById('gameover').style.display='none';document.getElementById('menu').style.display='flex'}
function restart(){
bitti=false;oyun=true;document.getElementById('gameover').style.display='none';
enemies.forEach(e=>sc.remove(e.m));resources.forEach(r=>sc.remove(r.m));
enemies=[];resources=[];dalga=1;zorluk=1;zaman=0;wT=3;atkCD=0;
S.h=100;S.hu=100;S.t=100;S.st=100;
oyuncu.x=0;oyuncu.y=0.5;oyuncu.z=0;oyuncu.vx=0;oyuncu.vy=0;oyuncu.vz=0;
UI();document.getElementById('waveText').textContent='';document.getElementById('crosshair').style.display='block';
document.body.requestPointerLock();
}
function basla(){
document.getElementById('menu').style.display='none';document.body.requestPointerLock();
document.getElementById('crosshair').style.display='block';oyun=true;bitti=false;
}

function bitir(s){
bitti=true;oyun=false;document.exitPointerLock();
document.getElementById('gameover').style.display='flex';
document.getElementById('goText').innerHTML=s+'<br><br>'+Math.floor(zaman)+'s hayatta kaldın | '+dalga+'. dalga';
document.getElementById('crosshair').style.display='none';
}

function notif(m,c){const e=document.getElementById('notif');e.textContent=m;e.style.color=c;e.style.opacity='1';if(nTM)clearTimeout(nTM);nTM=setTimeout(()=>e.style.opacity='0',1500);}

function UI(){
const s=S;
document.getElementById('hb').style.width=(s.h/s.hMax*280)+'px';
document.getElementById('hub').style.width=(s.hu/s.huMax*280)+'px';
document.getElementById('thb').style.width=(s.t/s.tMax*280)+'px';
document.getElementById('timerTxt').textContent=Math.floor(zaman)+'s | Dalga '+dalga;
let c='#cc0000';if(s.h<25)c='#ff0000';else if(s.h<50)c='#ff6600';
document.getElementById('hb').style.background=c;
}

function spawnKaynak(){
if(resources.length>=10)return;
const tip=Math.random()>0.5?'y':'s';
const boy=0.35;
const geo=tip==='y'?new THREE.BoxGeometry(boy,boy,boy):new THREE.CylinderGeometry(boy/2,boy/2,boy,8);
const mat=new THREE.MeshStandardMaterial({color:tip==='y'?0x55ee55:0x55aaee,emissive:tip==='y'?0x226622:0x224466,emissiveIntensity:0.4});
const m=new THREE.Mesh(geo,mat);
let p;
for(let a=0;a<10;a++){p={x:(Math.random()-0.5)*80,z:(Math.random()-0.5)*80};if(Math.abs(p.x)>3||Math.abs(p.z)>3)break;}
m.position.set(p.x,0.3,p.z);m.rotation.set(Math.random()*6,Math.random()*6,0);
sc.add(m);
const miktar=(8+Math.random()*5)/(1+zorluk*0.3);
resources.push({m:m,type:tip,amount:miktar,oy:p.y});
}

function spawnDusman(){
const aci=Math.random()*6.28,mes=12+Math.random()*18;
const p={x:oyuncu.x+Math.cos(aci)*mes,z:oyuncu.z+Math.sin(aci)*mes};
const yuk=1.4+Math.random()*0.6;
const hue=Math.min(1,dalga*0.015);
const mat=new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(hue,0.9,0.35),emissive:new THREE.Color().setHSL(hue,0.9,0.1),emissiveIntensity:0.6});
const m=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,yuk,6),mat);
m.position.set(p.x,yuk/2,p.z);m.castShadow=true;
sc.add(m);
enemies.push({m:m,x:p.x,z:p.z,speed:3+dalga*0.3+Math.random()*0.5,hp:2+dalga*0.15,dmg:12+dalga*1.8,atkTM:0,height:yuk});
}

// ============ THREE.JS ============
document.getElementById('loading').style.display='none';

sc = new THREE.Scene();
sc.background = new THREE.Color(0x2a2a3e);
sc.fog = new THREE.FogExp2(0x2a2a3e, 0.008);

cam = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 200);
cam.position.set(0,0.8,0);

ren = new THREE.WebGLRenderer({antialias:true});
ren.setSize(innerWidth,innerHeight);
ren.setPixelRatio(Math.min(devicePixelRatio,2));
ren.shadowMap.enabled = true;
document.body.prepend(ren.domElement);

// IŞIKLAR - güçlü
const amb = new THREE.AmbientLight(0x4444aa, 0.7);
sc.add(amb);
const g1 = new THREE.DirectionalLight(0xffaa66, 0.9);
g1.position.set(40,60,30); g1.castShadow=true;
sc.add(g1);
const g2 = new THREE.DirectionalLight(0x6688ff, 0.4);
g2.position.set(-30,20,-40);
sc.add(g2);

// ZEMİN - açık renk
const zm = new THREE.MeshStandardMaterial({color:0x3a3a4a,roughness:0.8});
const zemin = new THREE.Mesh(new THREE.PlaneGeometry(120,120), zm);
zemin.rotation.x=-Math.PI/2; zemin.receiveShadow=true;
sc.add(zemin);

// DUVARLAR - görünür
const wm = new THREE.MeshStandardMaterial({color:0x555568,roughness:0.6});
function dw(x,y,z,sx,sy,sz){
const w=new THREE.Mesh(new THREE.BoxGeometry(sx,sy,sz),wm);
w.position.set(x,y,z);w.castShadow=true;w.receiveShadow=true;sc.add(w);du$.push(w);
}
dw(0,1.75,-59,120,3.5,0.5);dw(0,1.75,59,120,3.5,0.5);
dw(-59,1.75,0,0.5,3.5,120);dw(59,1.75,0,0.5,3.5,120);

// RENKLİ ENGELLER
const renkler=[0x55aa55,0xaa5533,0x5566aa,0x886633,0x555555];
for(let i=0;i<80;i++){
const h=0.5+Math.random()*2.5,w=0.5+Math.random()*1.8,d=0.5+Math.random()*1.8;
const mat=new THREE.MeshStandardMaterial({color:renkler[Math.floor(Math.random()*renkler.length)],roughness:0.7});
const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
let px,pz;
for(let a=0;a<10;a++){px=(Math.random()-0.5)*106;pz=(Math.random()-0.5)*106;if(Math.abs(px)>2||Math.abs(pz)>2)break;}
m.position.set(px||0,h/2,pz||0);m.rotation.y=Math.random()*6;m.castShadow=true;m.receiveShadow=true;
sc.add(m);du$.push(m);
}

// BAŞLANGIÇ KAYNAKLARI
for(let i=0;i<8;i++)spawnKaynak();

// OLAY DİNLEYİCİLER
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='KeyR'&&bitti)restart();});
document.addEventListener('keyup',e=>keys[e.code]=false);
document.addEventListener('mousemove',e=>{
if(document.pointerLockElement!==document.body)return;
oyuncu.yaw-=e.movementX*0.002;oyuncu.pitch-=e.movementY*0.002;oyuncu.pitch=Math.max(-1.3,Math.min(1.3,oyuncu.pitch));
});
document.addEventListener('mousedown',e=>{if(e.button===0&&oyun){md=true;if(document.pointerLockElement!==document.body)document.body.requestPointerLock();}});
document.addEventListener('mouseup',e=>{if(e.button===0)md=false;});
document.addEventListener('contextmenu',e=>e.preventDefault());
addEventListener('resize',()=>{ren&&(ren.setSize(innerWidth,innerHeight),cam.aspect=innerWidth/innerHeight,cam.updateProjectionMatrix())});

// OYUN DÖNGÜSÜ
function anim(){
requestAnimationFrame(anim);
const dt=Math.min(saat.getDelta(),0.05);

// Oyun başlamadıysa sürekli render et (siyah ekran olmasın)
if(!oyun&&!bitti){ren.render(sc,cam);return;}
if(!oyun){ren.render(sc,cam);return;}

zaman+=dt;

// Stats
S.hu-=2.5*(1+zorluk*0.25)*dt;S.t-=3.5*(1+zorluk*0.25)*dt;
if(S.hu<=0||S.t<=0)S.h-=6*zorluk*dt;
S.hu=Math.max(0,S.hu);S.t=Math.max(0,S.t);
if(S.h<=0)bitir('Açlık/Susuzluk seni buldu!');

// Stamina
if(keys['ShiftLeft']||keys['ShiftRight'])S.st=Math.max(0,S.st-15*dt);
else S.st=Math.min(S.stMax,S.st+8*dt);

// Hareket
const mx={x:0,z:0};
if(keys['KeyW']||keys['ArrowUp'])mx.z=-1;if(keys['KeyS']||keys['ArrowDown'])mx.z=1;
if(keys['KeyA']||keys['ArrowLeft'])mx.x=-1;if(keys['KeyD']||keys['ArrowRight'])mx.x=1;
const len=Math.sqrt(mx.x*mx.x+mx.z*mx.z);
if(len>0){mx.x/=len;mx.z/=len;}
const sprint=(keys['ShiftLeft']||keys['ShiftRight'])&&S.st>3;
const hiz=(len>0)?(sprint?9:5):0;
const fwd={x:-Math.sin(oyuncu.yaw),z:-Math.cos(oyuncu.yaw)};
const rgt={x:fwd.z,z:-fwd.x};
oyuncu.vx=(fwd.x*mx.z*-1+rgt.x*mx.x)*hiz*dt;
oyuncu.vz=(fwd.z*mx.z*-1+rgt.z*mx.x)*hiz*dt;

if(keys['Space']&&oyuncu.yerde){oyuncu.vy=5;oyuncu.yerde=false;}
oyuncu.vy-=22*dt;
oyuncu.x+=oyuncu.vx;oyuncu.z+=oyuncu.vz;oyuncu.y+=oyuncu.vy;
if(oyuncu.y<0.5){oyuncu.y=0.5;oyuncu.vy=0;oyuncu.yerde=true;}

const sinir=57;
oyuncu.x=Math.max(-sinir,Math.min(sinir,oyuncu.x));
oyuncu.z=Math.max(-sinir,Math.min(sinir,oyuncu.z));

// Engel çarpışma
for(let o of du$){
if(o.geometry.type!=='BoxGeometry')continue;
const sz=new THREE.Vector3();o.geometry.boundingBox.getSize(sz);
const hw=sz.x*o.scale.x/2/2+0.25,hd=sz.z*o.scale.z/2/2+0.25;
const dx=oyuncu.x-o.position.x,dz=oyuncu.z-o.position.z;
if(Math.abs(dx)<hw&&Math.abs(dz)<hd){
if(Math.abs(dx/hw)>Math.abs(dz/hd))oyuncu.x=o.position.x+Math.sign(dx)*hw;
else oyuncu.z=o.position.z+Math.sign(dz)*hd;
}
}

// Kamera
cam.position.set(oyuncu.x,oyuncu.y+0.3,oyuncu.z);
cam.rotation.order='YXZ';cam.rotation.y=oyuncu.yaw;cam.rotation.x=oyuncu.pitch;

// Saldırı
atkCD-=dt;
if(md&&atkCD<=0){
atkCD=0.35;
const dir=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
const org=cam.position.clone();let hit=null,best=5.5;
for(let e of enemies){
const tE=new THREE.Vector3(e.x-org.x,0,e.z-org.z);
const d=tE.length();
if(d<best&&dir.dot(tE.normalize())>0.85){best=d;hit=e;}
}
if(hit){
hit.hp-=1;const kbx=hit.x-oyuncu.x,kbz=hit.z-oyuncu.z;
const kbl=Math.sqrt(kbx*kbx+kbz*kbz);
if(kbl>0){hit.x+=kbx/kbl*1.8;hit.z+=kbz/kbl*1.8;}
if(hit.hp<=0){sc.remove(hit.m);enemies.splice(enemies.indexOf(hit),1);}
}
document.getElementById('flash').style.opacity='0.12';setTimeout(()=>document.getElementById('flash').style.opacity='0',50);
}

// Dalga
wT-=dt;
if(wT<=0&&!bitti){
dalga++;zorluk=1+(dalga-1)*0.25;
document.getElementById('waveText').textContent='!!! DALGA '+dalga+' !!!';
notif('DALGA '+dalga+'!','#ff4444');
setTimeout(()=>{if(!bitti)document.getElementById('waveText').textContent='DALGA '+dalga;},2000);
const adet=Math.floor(2+dalga*1.8);
for(let i=0;i<adet;i++)spawnDusman();
wT=4+dalga*0.5;
}

if(resources.length<8)spawnKaynak();

// Düşmanlar
for(let i=enemies.length-1;i>=0;i--){
const e=enemies[i];
let dx=oyuncu.x-e.x,dz=oyuncu.z-e.z;
let d=Math.sqrt(dx*dx+dz*dz);
if(d>0.3){dx/=d;dz/=d;e.x+=dx*e.speed*dt;e.z+=dz*e.speed*dt;}
e.x=Math.max(-sinir+0.3,Math.min(sinir-0.3,e.x));
e.z=Math.max(-sinir+0.3,Math.min(sinir-0.3,e.z));
e.m.position.set(e.x,e.height/2,e.z);
e.m.lookAt(new THREE.Vector3(oyuncu.x,e.m.position.y,oyuncu.z));
e.atkTM-=dt;
if(d<2.2&&e.atkTM<=0){
e.atkTM=0.5;S.h-=e.dmg*dt*2.5;
document.getElementById('flash').style.opacity='0.3';setTimeout(()=>document.getElementById('flash').style.opacity='0',100);
if(S.h<=0)bitir('Düşmanlara yenildin!');
}
}

// Kaynaklar
for(let r of resources){
r.m.position.y=r.oy+Math.sin(zaman*2+r.m.position.x)*0.05;
r.m.rotation.y+=dt;
}

if(keys['KeyE']){
keys['KeyE']=false;
let near=null,best=2.8;
for(let r of resources){
const d=Math.sqrt((r.m.position.x-oyuncu.x)**2+(r.m.position.z-oyuncu.z)**2);
if(d<best){best=d;near=r;}
}
if(near){
let ok=false;
if(near.type==='y'&&S.hu<S.huMax){S.hu=Math.min(S.huMax,S.hu+near.amount);S.h=Math.min(S.hMax,S.h+near.amount*0.3);notif('+Yiyecek','#55ee55');ok=true;}
else if(near.type==='s'&&S.t<S.tMax){S.t=Math.min(S.tMax,S.t+near.amount);S.h=Math.min(S.hMax,S.h+near.amount*0.2);notif('+Su','#55aaee');ok=true;}
else notif('Dolusun!','#ffcc00');
sc.remove(near.m);resources.splice(resources.indexOf(near),1);
}
}

UI();
ren.render(sc,cam);
}
anim();
</script>
</body>
</html>
